name: Сборка APK

# КОГДА ЗАПУСКАТЬ СБОРКУ
on:
  # Убираем автоматический запуск при push
  # push:
  #   branches: [ main, master ]
  
  # Оставляем только ручной запуск
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия сборки (например, v1.0.0)'
        required: false
        default: 'manual-build'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Получение кода
        uses: actions/checkout@v4
      
      - name: ⚙️ Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      
      - name: ☕ Установка JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: 📱 Установка Android SDK
        uses: android-actions/setup-android@v3
      
      - name: 🚀 Установка Expo CLI
        run: npm install -g expo-cli eas-cli
      
      - name: 📦 Установка зависимостей
        run: npm ci
      
      - name: 🔨 Сборка Android APK
        run: |
          npx expo prebuild --clean
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - name: 💾 Сохранение APK
        uses: actions/upload-artifact@v4
        with:
          name: FamNote-APK-${{ github.event.inputs.version || 'manual' }}-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
