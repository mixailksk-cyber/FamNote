name: Simple Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: npm install
      
      - name: Remove widget completely
        run: |
          # Удаляем все файлы виджета
          rm -rf widgets
          rm -f plugins/withWidgetAndroid.js
          rm -rf android/app/src/main/java/com/mkhailksk/famnotes/widget
          rm -f android/app/src/main/res/layout/widget_notes.xml
          rm -f android/app/src/main/res/xml/notes_widget_info.xml
      
      - name: Remove widget from app.json
        run: |
          # Удаляем плагин виджета из app.json
          sed -i '/withWidgetAndroid/d' app.json
      
      - name: Expo prebuild
        run: npx expo prebuild --clean --platform android
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
      
      - name: Show error if failed
        if: failure()
        run: |
          echo "=== FULL ERROR ==="
          tail -500 android/build.log 2>/dev/null || echo "No build.log"
          echo "=== GRADLE ERROR ==="
          find android -name "*.log" -exec tail -200 {} \;
